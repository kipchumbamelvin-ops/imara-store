<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imara Store — Catalogue</title><style>
body { font-family: Arial, sans-serif; margin:0; background:#0b0b0b; color:#fff; }
.hero { padding:60px 20px; text-align:center; }
.btn { padding:14px 24px; border-radius:30px; text-decoration:none; display:inline-block; }
.primary { background:linear-gradient(90deg,#00c896,#00a8e8); color:#000; }
.catalogue { display:none; padding:20px; background:#fff; color:#000; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; }
.card { border:1px solid #ddd; padding:16px; border-radius:12px; text-align:center; }
.price { font-weight:bold; margin-top:10px; }
@media print {
  body * { visibility:hidden; }
  .catalogue, .catalogue * { visibility:visible; }
  .catalogue { position:absolute; top:0; left:0; width:100%; }
}
</style><script>
function openCatalogue(e) {
  if(e) e.preventDefault();
  document.querySelector('.catalogue').style.display = 'block';
  setTimeout(() => window.print(), 300);
}
</script></head><body><section class="hero">
  <h1>Imara Store</h1>
  <p>Product Catalogue</p>
  <a href="javascript:void(0);" onclick="openCatalogue(event)" class="btn primary">Shop Now →</a>
</section><section class="catalogue">
  <h2>Imara Store Catalogue</h2>
  <div class="grid"><div class="card">
  <svg width="80" height="80" viewBox="0 0 100 100">
    <circle cx="30" cy="50" r="15" stroke="#00c896" fill="none"/>
    <circle cx="70" cy="50" r="15" stroke="#00c896" fill="none"/>
  </svg>
  <h3>Wireless Earbuds</h3>
  <div class="price">KES 800</div>
</div>

<div class="card">
  <svg width="80" height="80" viewBox="0 0 100 100">
    <rect x="20" y="20" width="60" height="60" stroke="#00a8e8" fill="none"/>
    <line x1="20" y1="50" x2="80" y2="50" stroke="#00a8e8"/>
  </svg>
  <h3>LED Strip Lights</h3>
  <div class="price">KES 600</div>
</div>

<div class="card">
  <svg width="80" height="80" viewBox="0 0 100 100">
    <circle cx="50" cy="40" r="20" stroke="#ff6b35" fill="none"/>
    <rect x="45" y="60" width="10" height="20" fill="#ff6b35"/>
  </svg>
  <h3>Ring Light</h3>
  <div class="price">KES 1200</div>
</div>

  </div>
</section></body>
</html>
