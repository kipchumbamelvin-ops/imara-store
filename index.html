<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imara Store \u2014 Quality You Can Trust \ud83c\uddf0\ud83c\uddea</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --surface: #111111;
  --surface2: #181818;
  --surface3: #202020;
  --border: #2a2a2a;
  --accent: #00c896;
  --accent2: #00a8e8;
  --accent3: #ff6b35;
  --text: #f0f0f0;
  --muted: #777;
  --card-bg: #131313;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
  cursor: none;
}

/* Custom cursor */
.cursor {
  width: 12px; height: 12px;
  background: var(--accent);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.1s;
  mix-blend-mode: difference;
}
.cursor-follower {
  width: 36px; height: 36px;
  border: 1px solid var(--accent);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9998;
  transition: all 0.15s ease;
  opacity: 0.5;
}

/* Noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 500;
  padding: 20px 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(8,8,8,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 3px;
}

.nav-links {
  display: flex;
  gap: 36px;
  list-style: none;
}

.nav-links a {
  color: var(--muted);
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 1px;
  transition: color 0.2s;
}

.nav-links a:hover { color: var(--accent); }

.nav-cta {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  color: #000 !important;
  padding: 10px 24px;
  border-radius: 30px;
  font-weight: 600 !important;
  font-size: 13px !important;
  letter-spacing: 1px;
  transition: opacity 0.2s !important;
}

.nav-cta:hover { opacity: 0.8; color: #000 !important; }

/* HERO */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 120px 60px 80px;
  position: relative;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 60% 50%, rgba(0,200,150,0.06) 0%, transparent 70%),
              radial-gradient(ellipse 50% 50% at 20% 80%, rgba(0,168,232,0.04) 0%, transparent 60%);
}

.hero-grid {
  position: absolute;
  inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 600px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,200,150,0.1);
  border: 1px solid rgba(0,200,150,0.3);
  padding: 6px 16px;
  border-radius: 30px;
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 2px;
  margin-bottom: 28px;
  animation: fadeUp 0.6s ease both;
}

.hero-badge::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.5); }
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(52px, 7vw, 88px);
  font-weight: 900;
  line-height: 1.0;
  color: #fff;
  animation: fadeUp 0.6s 0.1s ease both;
}

.hero h1 em {
  font-style: italic;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero-sub {
  font-size: 17px;
  color: var(--muted);
  margin: 24px 0 40px;
  line-height: 1.7;
  max-width: 460px;
  animation: fadeUp 0.6s 0.2s ease both;
}

.hero-buttons {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  animation: fadeUp 0.6s 0.3s ease both;
}

.btn-primary {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  color: #000;
  padding: 16px 36px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 15px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 30px rgba(0,200,150,0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 50px rgba(0,200,150,0.4);
}

.btn-secondary {
  border: 1px solid var(--border);
  color: var(--text);
  padding: 16px 36px;
  border-radius: 50px;
  font-size: 15px;
  text-decoration: none;
  transition: border-color 0.2s, color 0.2s;
}

.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* Hero visual */
.hero-visual {
  position: absolute;
  right: 60px;
  top: 50%;
  transform: translateY(-50%);
  width: 480px;
  height: 480px;
  animation: fadeUp 0.8s 0.2s ease both;
}

.hero-float {
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  33% { transform: translateY(-15px) rotate(1deg); }
  66% { transform: translateY(-8px) rotate(-1deg); }
}

/* Stats bar */
.stats-bar {
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 28px 60px;
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.stat-item { text-align: center; }
.stat-number {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 700;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.stat-label { font-size: 12px; color: var(--muted); letter-spacing: 1px; margin-top: 4px; }
.stat-divider { width: 1px; height: 40px; background: var(--border); }

/* Section styles */
section { padding: 100px 60px; }

.section-tag {
  display: inline-block;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 4vw, 52px);
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
  margin-bottom: 16px;
}

.section-sub {
  font-size: 16px;
  color: var(--muted);
  max-width: 500px;
  line-height: 1.7;
  margin-bottom: 60px;
}

/* Category filters */
.filter-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 48px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 10px 24px;
  border-radius: 30px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.5px;
}

.filter-btn:hover, .filter-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,200,150,0.08);
}

/* Products grid */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

.product-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
  position: relative;
}

.product-card:hover {
  transform: translateY(-6px);
  border-color: rgba(0,200,150,0.4);
  box-shadow: 0 20px 60px rgba(0,200,150,0.1);
}

.product-image {
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.product-badge {
  position: absolute;
  top: 14px;
  left: 14px;
  background: var(--accent3);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 1px;
  z-index: 2;
}

.product-badge.new { background: var(--accent); color: #000; }
.product-badge.hot { background: var(--accent3); }

.product-info {
  padding: 20px;
}

.product-category {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

.product-name {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: #fff;
  margin-bottom: 8px;
  line-height: 1.3;
}

.product-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 16px;
}

.product-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.product-price {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
}

.product-price span {
  font-size: 12px;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  margin-right: 4px;
}

.order-btn {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  color: #000;
  border: none;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.5px;
  text-decoration: none;
  display: inline-block;
}

.order-btn:hover { opacity: 0.85; transform: scale(1.05); }

/* Features section */
.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 24px;
}

.feature-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s;
}

.feature-card:hover { border-color: var(--accent); }

.feature-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0;
  transition: opacity 0.3s;
}

.feature-card:hover::before { opacity: 1; }

.feature-icon {
  width: 52px; height: 52px;
  background: rgba(0,200,150,0.1);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin-bottom: 20px;
}

.feature-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: #fff;
  margin-bottom: 10px;
}

.feature-text { font-size: 14px; color: var(--muted); line-height: 1.7; }

/* Marquee */
.marquee-section {
  padding: 32px 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}

.marquee-track {
  display: flex;
  gap: 60px;
  animation: marquee 20s linear infinite;
  white-space: nowrap;
}

.marquee-item {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  color: var(--muted);
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}

.marquee-item::after {
  content: '\u2726';
  color: var(--accent);
}

@keyframes marquee {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* Testimonials */
.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.testimonial-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  position: relative;
}

.testimonial-card::before {
  content: '"';
  position: absolute;
  top: 20px; right: 28px;
  font-family: 'Playfair Display', serif;
  font-size: 80px;
  color: rgba(0,200,150,0.1);
  line-height: 1;
}

.stars { color: var(--accent); font-size: 14px; margin-bottom: 16px; letter-spacing: 3px; }
.testimonial-text { font-size: 15px; color: #aaa; line-height: 1.8; margin-bottom: 24px; font-style: italic; }
.testimonial-author { display: flex; align-items: center; gap: 12px; }
.author-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  color: #000;
  font-size: 16px;
}
.author-name { font-size: 14px; color: #fff; font-weight: 500; }
.author-location { font-size: 12px; color: var(--muted); }

/* CTA Section */
.cta-section {
  background: linear-gradient(135deg, rgba(0,200,150,0.08), rgba(0,168,232,0.08));
  border: 1px solid rgba(0,200,150,0.15);
  border-radius: 32px;
  padding: 80px;
  text-align: center;
  position: relative;
  overflow: hidden;
  margin: 0 60px;
}

.cta-section::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse 40% 40% at 50% 50%, rgba(0,200,150,0.05) 0%, transparent 70%);
  animation: rotate 20s linear infinite;
}

@keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.cta-section h2 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 4vw, 52px);
  color: #fff;
  margin-bottom: 16px;
  position: relative;
}

.cta-section p {
  color: var(--muted);
  font-size: 16px;
  margin-bottom: 40px;
  position: relative;
}

.whatsapp-btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: #25D366;
  color: #fff;
  padding: 18px 48px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 40px rgba(37,211,102,0.3);
  position: relative;
}

.whatsapp-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 60px rgba(37,211,102,0.4);
}

/* Footer */
footer {
  padding: 60px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: gap;
}

.footer-logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 3px;
}

.footer-tagline { font-size: 13px; color: var(--muted); margin-top: 6px; }
.footer-copy { font-size: 13px; color: var(--muted); }
.footer-flag { font-size: 24px; }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

.reveal {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Mobile */
@media (max-width: 768px) {
  nav { padding: 16px 24px; }
  .nav-links { display: none; }
  .hero { padding: 100px 24px 60px; }
  .hero-visual { display: none; }
  section { padding: 60px 24px; }
  .stats-bar { padding: 24px; gap: 20px; flex-wrap: wrap; }
  .cta-section { margin: 0 24px; padding: 48px 24px; }
  footer { padding: 40px 24px; flex-direction: column; gap: 20px; text-align: center; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
</style>
</head>

<div class="cursor-follower" id="cursorFollower"></div>
