<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imara Store</title>
<style>
body {font-family: Arial, sans-serif; background:#0f0f0f; color:#fff; margin:0;}
header {padding:20px; text-align:center; background:#1a1a1a;}
h1 {margin:0;}
.container {padding:20px; display:grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap:15px;}
.card {background:#1a1a1a; padding:15px; border-radius:12px; border:1px solid #2a2a2a; text-align:center;}
.icon {width:100%; height:140px; object-fit:contain; background:#111; border-radius:10px; padding:10px;}
.title {font-size:14px; margin:10px 0;}
.price {color:#00c896; font-weight:bold; margin-bottom:10px;}
button {width:100%; padding:10px; border:none; background:#00c896; color:#000; border-radius:6px; cursor:pointer; font-weight:bold;}
button:hover {opacity:0.9;}
footer {text-align:center; padding:15px; color:#888;}
</style>
</head>
<body><header>
<h1>Imara Store</h1>
<p>Affordable Tech for Campus Life</p>
</header><div class="container"><div class="card">
<img class="icon" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 100' stroke='white' fill='none' stroke-width='2'><path d='M10 50h180'/><path d='M30 30v40'/><path d='M170 30v40'/><path d='M50 40h100'/></svg>">
<div class="title">Type-C Cable</div>
<div class="price">KES 150</div>

</div><div class="card">
<img class="icon" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 100' stroke='white' fill='none' stroke-width='2'><rect x='70' y='20' width='60' height='60' rx='8'/><path d='M80 30h40'/><path d='M80 45h40'/></svg>">

</div><div class="card">

<div class="title">Wireless Earbuds</div>

<button onclick="order('Wireless Earbuds - 700')">Buy via WhatsApp</button>
</div><div class="card">

<p>Pay on Delivery • Test Before Payment</p>
</footer><script>
function order(product) {
  let phone = '254736267625';
  let message = `Hello, I want to order: ${product}`;
  let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url, '_blank');
}
</script></body>
</html>
